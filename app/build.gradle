plugins {
    id 'com.android.application'
}

android {
    namespace 'app.aoki.yuki.wirelesstntn'
    compileSdk 35

    defaultConfig {
        applicationId "app.aoki.yuki.wirelesstntn"
        minSdk 35
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// Exclude split kotlin-stdlib jdk7/jdk8 artifacts that conflict with kotlin-stdlib >= 1.8
configurations.all {
    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // XposedBridge API stubs (compile-time only).
    // The real XposedBridge is injected at runtime by the LSPosed framework;
    // this stub JAR is never packaged into the APK.
    compileOnly fileTree(dir: 'libs', include: ['*.jar'])
}
